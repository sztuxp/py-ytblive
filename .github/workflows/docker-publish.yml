name: Manual Build and Push py-ytblive

# 修改触发条件：仅允许手动触发
on:
  workflow_dispatch:
    # 你甚至可以添加输入参数，比如手动指定镜像标签
    inputs:
      tag_name:
        description: 'Docker Image Tag (e.g., v1.0.0)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # 使用手动输入的分支标签，同时保留 commit 哈希作为备份
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/py-ytblive:${{ github.event.inputs.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/py-ytblive:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
